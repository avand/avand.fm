<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 16 16" to="360 16 16" dur="2s" repeatCount="indefinite"/>
    <!-- Vinyl -->
    <circle cx="16" cy="16" r="15" fill="#c87533"/>
    <!-- Label -->
    <circle cx="16" cy="16" r="6" fill="white"/>
    <!-- Indicator dot on label -->
    <circle cx="19" cy="14" r="1.2" fill="#c87533"/>
    <!-- Spindle hole -->
    <circle cx="16" cy="16" r="1.2" fill="#0a0a0f"/>
  </g>
</svg>

<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}" />
  {% if page.og_image %}<meta property="og:image" content="{{ page.og_image }}" />{% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/headroom/favicon.svg" id="favicon" />
  <!-- Fathom Analytics -->
  <script src="https://cdn.usefathom.com/script.js" data-site="ITRXNPNT" defer></script>

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e4e4eb;
      --text-muted: #8a8a9a;
      --accent: #9207c3;
      --accent-glow: rgba(146, 7, 195, 0.3);
      --warm: #ff6116;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Cairo", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(1em);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8em 2em;
    }

    nav .brand {
      font-weight: 700;
      font-size: 1.1em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    nav .brand a {
      color: var(--text);
      text-decoration: none;
    }

    nav .brand a:hover {
      opacity: 0.75;
    }

    nav .cta-nav a {
      color: var(--bg);
      background: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85em;
      padding: 0.5em 1.4em;
      border-radius: 2em;
      transition: opacity 200ms;
    }

    nav .cta-nav a:hover {
      opacity: 0.85;
    }

    footer {
      text-align: center;
      padding: 2em;
      color: var(--text-muted);
      font-size: 0.85em;
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--text);
      text-decoration: none;
    }

    @media (max-width: 640px) {
      nav {
        padding: 0.6em 1.2em;
      }
    }
  </style>
</head>

<body>
  <nav>
    <div class="brand">
      <a href="/">avand.fm</a> / <a href="/headroom/">headroom</a>
    </div>
    <div class="cta-nav">
      <a href="https://calendar.app.google/2dhPnZHUngrQUUoF7" target="_blank">Book a call</a>
    </div>
  </nav>

  {{ content }}

  <footer>
    <a href="/">avand.fm</a>
    &middot; <a href="/headroom/">Headroom</a>
    {% if page.section %}&middot; {% if page.section_url %}<a href="{{ page.section_url }}">{{ page.section }}</a>{% else %}{{ page.section }}{% endif %}{% endif %}
    {% if page.subsection %}&middot; {{ page.subsection }}{% endif %}
    &middot; 2026
  </footer>

  <script>
    (function() {
      var size = 32, frames = 36, urls = [], frame = 0;
      var canvas = document.createElement("canvas");
      canvas.width = size; canvas.height = size;
      var ctx = canvas.getContext("2d");
      var cx = size / 2, cy = size / 2;
      for (var i = 0; i < frames; i++) {
        ctx.clearRect(0, 0, size, size);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate((i / frames) * Math.PI * 2);
        ctx.translate(-cx, -cy);
        ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI * 2); ctx.fillStyle = "#111"; ctx.fill();
        ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI * 2); ctx.fillStyle = "#ff6116"; ctx.fill();
        ctx.beginPath(); ctx.arc(cx, cy, 5.5, -0.8, 0.8); ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.lineCap = "round"; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, 1.2, 0, Math.PI * 2); ctx.fillStyle = "#ccc"; ctx.fill();
        ctx.restore();
        urls.push(canvas.toDataURL("image/png"));
      }
      var link = document.getElementById("favicon");
      setInterval(function() { frame = (frame + 1) % frames; link.href = urls[frame]; }, 1800 / frames);
    })();
  </script>
</body>

</html>
